title: " "
button_card_templates:
  # ═══ 基础毛玻璃样式 ═══
  tile_base:
    styles:
      card:
        - background: "rgba(255,255,255,0.15)"
        - backdrop-filter: "blur(28px)"
        - -webkit-backdrop-filter: "blur(28px)"
        - border-radius: "14px"
        - border: "1px solid rgba(255,255,255,0.18)"
        - transition: "all 0.35s cubic-bezier(0.4,0,0.2,1)"
        - overflow: hidden
        - padding: 0
        - min-width: 0
      card_hover:
        - background: "rgba(255,255,255,0.28)"
        - transform: "translateY(-3px)"
        - box-shadow: "0 12px 40px rgba(0,0,0,0.40)"
        - border-color: "rgba(255,255,255,0.40)"
    extra_styles: |
      @keyframes tilePulse {
        0%,100% { transform: scale(1); }
        50% { transform: scale(1.015); }
      }
      @keyframes valuePop {
        0% { opacity: 0; transform: translateY(6px) scale(0.9); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
      }
      @keyframes shimmer {
        0% { background-position: -200% center; }
        100% { background-position: 200% center; }
      }
      /* ── 天气动效 ── */
      @keyframes rainDrop {
        0%,100% { box-shadow: inset 0 0 0 rgba(100,180,255,0); }
        50% { box-shadow: inset 0 0 30px rgba(100,180,255,0.3), inset 0 -80px 40px rgba(100,160,255,0.12); }
      }
      @keyframes snowFall {
        0%,100% { box-shadow: inset 0 0 0 rgba(255,255,255,0); }
        50% { box-shadow: inset 0 0 40px rgba(255,255,255,0.2), inset 0 -60px 30px rgba(255,255,255,0.08); }
      }
      @keyframes lightningFlash {
        0%,90%,92%,100% { box-shadow: inset 0 0 0 rgba(200,200,255,0); }
        91% { box-shadow: inset 0 0 80px rgba(200,220,255,0.6); }
      }
      @keyframes sunShimmer {
        0%,100% { box-shadow: inset 0 0 20px rgba(255,200,50,0.12); }
        50% { box-shadow: inset 0 0 50px rgba(255,200,50,0.28); }
      }
      @keyframes nightGlow {
        0%,100% { box-shadow: inset 0 0 20px rgba(150,180,255,0.10); }
        50% { box-shadow: inset 0 0 50px rgba(130,160,240,0.22); }
      }
      @keyframes windBlow {
        0%,100% { box-shadow: inset 8px 0 20px rgba(255,255,255,0.04); }
        50% { box-shadow: inset -8px 0 20px rgba(255,255,255,0.08); }
      }
      @keyframes fogPulse {
        0%,100% { opacity: 0.85; }
        50% { opacity: 1; }
      }
      @keyframes cloudyDrift {
        0%,100% { box-shadow: inset 0 0 20px rgba(255,255,255,0.04); }
        50% { box-shadow: inset 0 0 40px rgba(255,255,255,0.12); }
      }

  # ═══ 小磁贴 (1×1) — 单传感器 ═══
  tile_small:
    template:
      - tile_base
    show_icon: true
    show_name: true
    show_state: true
    show_label: false
    show_entity_picture: false
    styles:
      card:
        - display: flex
        - flex-direction: column
        - align-items: center
        - justify-content: center
        - text-align: center
        - min-height: 120px
        - padding: 6px 4px
      icon:
        - width: 30px
        - height: 30px
        - margin-bottom: 2px
        - color: "var(--icon-color)"
      name:
        - font-size: 13px
        - font-weight: 500
        - color: "rgba(255,255,255,0.65)"
        - margin-bottom: 3px
        - white-space: nowrap
        - overflow: hidden
        - text-overflow: ellipsis
        - max-width: 90%
      state:
        - font-size: 24px
        - font-weight: 700
        - color: white
        - animation: "valuePop 0.35s ease-out"
      img_cell:
        - display: none
    state_display: |
      [[[
        return (entity && entity.state)
          ? entity.state + ((entity.attributes && entity.attributes.unit_of_measurement) || '')
          : '--';
      ]]]

  # ═══ 控制磁贴 (2×2) — 内嵌 entities ═══
  tile_control:
    template:
      - tile_base
    show_icon: false
    show_name: true
    show_state: false
    show_label: false
    show_entity_picture: false
    styles:
      card:
        - min-height: 250px
        - padding: 8px 10px
      name:
        - font-size: 16px
        - font-weight: 700
        - color: white
        - margin-bottom: 4px
        - text-align: center
      grid:
        - grid-template-areas: '"n" "custom_fields"'
        - grid-template-rows: auto 1fr
    custom_fields:
      entities: null

  # ═══ 状态磁贴 (1×1) — 二进制传感器 ═══
  tile_status:
    template:
      - tile_small
    styles:
      icon:
        - width: 30px
        - height: 30px
      state:
        - font-size: 18px
        - font-weight: 600
        - text-transform: none
    state_display: |
      [[[
        return (entity && entity.state)
          ? (entity.state === 'on' ? '● 在线' : '○ 离线')
          : '--';
      ]]]

views:
  - title: " "
    panel: true
    path: overview
    cards:
      # ═══════════════════════════════════════════════════════════
      #  天气渐变背景（不做任何修改）
      # ═══════════════════════════════════════════════════════════
      - type: vertical-stack
        card_mod:
          style: |
            :host {
              background-color: #1a5fb8 !important;
              background-image: linear-gradient(180deg,
                {% set c = states('weather.xiang_song_yuan_home') or 'partlycloudy' %}
                {% set sun_st = states('sun.sun') or 'above_horizon' %}
                {% set hour = now().hour %}
                {% set is_night = sun_st == 'below_horizon' or 'night' in c or hour >= 20 or hour < 6 %}
                {% set g_day = {
                  'sunny':'#e67e22,#f39c12',
                  'clear':'#2980b9,#6dd5fa',
                  'clear-night':'#0f2027,#203a43',
                  'cloudy':'#5a7a9a,#8db3cc',
                  'partlycloudy':'#3d7eb8,#84c4e8',
                  'partlycloudy-night':'#1a2740,#2c4460',
                  'rainy':'#2c3e50,#546e7a',
                  'pouring':'#1a1a30,#2d2d50',
                  'lightning':'#373b44,#4286f4',
                  'snowy':'#8da0b0,#c8d6e0',
                  'snowy-rainy':'#6b7b8d,#9baab8',
                  'fog':'#7d8e9e,#aab8c2',
                  'hazy':'#9e9e9e,#bdbdbd',
                  'windy':'#4a6a8a,#7eb8da'
                } %}
                {% set g_night = {
                  'sunny':'#060612,#0c0e22',
                  'clear':'#050815,#0a1030',
                  'clear-night':'#040812,#080e28',
                  'cloudy':'#080c18,#111828',
                  'partlycloudy':'#080e1e,#101c30',
                  'partlycloudy-night':'#080e1e,#101c30',
                  'rainy':'#050612,#0e0e22',
                  'pouring':'#040410,#0a0a1e',
                  'lightning':'#060618,#141448',
                  'snowy':'#121620,#1e242e',
                  'snowy-rainy':'#0e1218,#1a1e26',
                  'fog':'#0e1218,#181c24',
                  'hazy':'#101010,#1c1c1c',
                  'windy':'#080e16,#101a26'
                } %}
                {% set g = g_night if is_night else g_day %}
                {% set gs = g.get(c, '#1a5fb8,#6dbdf0') %}
                {% set t = gs.split(',') %}
                {{ t[0] }} 0%,
                {{ t[1] }} 100%) !important;
              background-attachment: fixed !important;
              min-height: 100vh;
              padding: 10px 16px !important;
              box-sizing: border-box !important;
              overflow-x: hidden !important;
              max-width: 100vw !important;
            }
        cards:
          # ═══ 天气磁贴（大尺寸，垂直布局） ═══
          - type: custom:button-card
            template: tile_base
            entity: weather.xiang_song_yuan_home
            show_icon: true
            show_name: false
            show_state: true
            show_label: true
            show_entity_picture: false
            icon: |
              [[[
                if (!entity) return 'mdi:weather-partly-cloudy';
                var c = entity.state || 'partlycloudy';
                var isNight = c.indexOf('night') >= 0;
                if (!isNight && states && states['sun.sun']) {
                  isNight = states['sun.sun'].state === 'below_horizon';
                }
                var m_day = {
                  'sunny':'mdi:weather-sunny','clear':'mdi:weather-sunny',
                  'cloudy':'mdi:weather-cloudy','partlycloudy':'mdi:weather-partly-cloudy',
                  'rainy':'mdi:weather-rainy','pouring':'mdi:weather-pouring',
                  'lightning':'mdi:weather-lightning','snowy':'mdi:weather-snowy',
                  'snowy-rainy':'mdi:weather-snowy-rainy','fog':'mdi:weather-fog',
                  'hazy':'mdi:weather-hazy','windy':'mdi:weather-windy'
                };
                var m_night = {
                  'sunny':'mdi:weather-night','clear':'mdi:weather-night',
                  'cloudy':'mdi:weather-night-partly-cloudy','partlycloudy':'mdi:weather-night-partly-cloudy',
                  'rainy':'mdi:weather-rainy','pouring':'mdi:weather-pouring',
                  'lightning':'mdi:weather-lightning','snowy':'mdi:weather-snowy',
                  'snowy-rainy':'mdi:weather-snowy-rainy','fog':'mdi:weather-fog',
                  'hazy':'mdi:weather-hazy','windy':'mdi:weather-windy'
                };
                return (isNight ? m_night[c] : m_day[c]) || 'mdi:weather-partly-cloudy';
              ]]]
            state_display: |
              [[[
                if (!entity || !entity.attributes) return '--°';
                var t = entity.attributes.temperature;
                return (t != null ? t + '°' : '--°');
              ]]]
            label: |
              [[[
                if (!entity || !entity.state) return '';
                var labels = {
                  'sunny':'晴','clear':'晴','clear-night':'晴',
                  'cloudy':'多云','partlycloudy':'多云',
                  'rainy':'雨','pouring':'暴雨','lightning':'雷暴',
                  'snowy':'雪','snowy-rainy':'雨夹雪',
                  'fog':'雾','hazy':'霾','windy':'风'
                };
                var h = entity.attributes.humidity;
                var ws = entity.attributes.wind_speed;
                return (labels[entity.state] || entity.state) +
                  (h != null ? '  ·  湿度 ' + h + '%' : '') +
                  (ws != null ? '  ·  风速 ' + ws + ' km/h' : '');
              ]]]
            styles:
              card:
                - overflow: visible !important
                - display: flex
                - flex-direction: column
                - align-items: center
                - justify-content: center
                - gap: 6px
                - padding: 24px 20px
                - grid-column: span 3
                - grid-row: span 2
              icon:
                - width: 72px
                - height: 72px
                - color: white
              state:
                - font-size: 46px
                - font-weight: 700
                - color: white
                - line-height: 1
              label:
                - font-size: 15px
                - font-weight: 500
                - color: rgba(255,255,255,0.8)
                - text-align: center
              grid:
                - grid-template-areas: '"i" "s" "l"'
                - grid-template-columns: 1fr
                - grid-template-rows: auto auto auto
              name:
                - display: none
              img_cell:
                - display: none

          # ═══════════════════════════════════════════════════════
          #  磁贴网格（layout-card + button-card）
          # ═══════════════════════════════════════════════════════
          - type: custom:layout-card
            layout_type: grid
            layout:
              grid-template-columns: repeat(6, 1fr)
              grid-auto-rows: 130px
              grid-auto-flow: dense
              grid-gap: 8px
            reorder: true
            sortable: true
            card_mod:
              style: |
                :host {
                  background: transparent !important;
                  border: none !important;
                  box-shadow: none !important;
                  overflow: hidden !important;
                  max-width: 100% !important;
                }
                /* 拖拽补位动画 */
                .card {
                  transition: all 0.35s cubic-bezier(0.4,0,0.2,1) !important;
                }
            cards:
              # 运行时间（右上角小卡片，放第1行最后一列）
              - type: custom:button-card
                template: tile_small
                entity: sensor.airflow_airflow_yun_xing_shi_jian
                name: 运行时间
                icon: mdi:progress-clock
                styles:
                  card:
                    - grid-column: span 1
                    - grid-row: span 1
                  state:
                    - font-size: 16px
                state_display: |
                  [[[
                    if (!entity || !entity.state) return '--';
                    var s = parseInt(entity.state || 0);
                    var d = Math.floor(s / 86400);
                    var h = Math.floor((s % 86400) / 3600);
                    return d + '天' + h + '时';
                  ]]]

              # 日出日落
              - type: custom:button-card
                template: tile_small
                entity: sun.sun
                name: 日出日落
                icon: "[[[ return (entity && entity.state === 'above_horizon') ? 'mdi:sun-clock-down' : 'mdi:sun-clock-up'; ]]]"
                styles:
                  card:
                    - grid-column: span 1
                    - grid-row: span 1
                  icon:
                    - color: "[[[ return (entity && entity.state === 'above_horizon') ? '#f39c12' : '#f1c40f'; ]]]"
                state_display: |
                  [[[
                    if (!entity || !entity.state) return '--';
                    var attrs = entity.attributes || {};
                    var next = entity.state === 'above_horizon' ? attrs.next_setting : attrs.next_rising;
                    if (!next) return entity.state === 'above_horizon' ? '☀ 白天' : '🌙 夜间';
                    var d = new Date(next);
                    var h = d.getHours();
                    var m = d.getMinutes();
                    var label = entity.state === 'above_horizon' ? '日落' : '日出';
                    return label + ' ' + (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m;
                  ]]]

              # ── 室内环境 ──

              # 室内温度
              - type: custom:button-card
                template: tile_small
                entity: sensor.airflow_airflow_wen_du
                name: 室内温度
                icon: mdi:thermometer
                styles:
                  card:
                    - grid-column: span 1
                    - grid-row: span 1
                  icon:
                    - color: "#ff3b30"

              # 甲醛
              - type: custom:button-card
                template: tile_small
                entity: sensor.airflow_airflow_jia_quan
                name: 甲醛
                icon: mdi:biohazard
                styles:
                  card:
                    - grid-column: span 1
                    - grid-row: span 1
                  icon:
                    - color: orange

              # CO₂
              - type: custom:button-card
                template: tile_small
                entity: sensor.airflow_airflow_co2
                name: CO₂
                icon: mdi:molecule-co2
                styles:
                  card:
                    - grid-column: span 1
                    - grid-row: span 1
                  icon:
                    - color: green

              # ── 状态指示 ──

              # 开关机状态
              - type: custom:button-card
                template: tile_status
                entity: binary_sensor.airflow_airflow_kai_guan_ji_zhuang_tai
                name: 开关机
                icon: mdi:power
                styles:
                  card:
                    - grid-column: span 1
                    - grid-row: span 1
                  icon:
                    - color: "[[[ if (!entity || !entity.state) return '#95a5a6'; return entity.state === 'on' ? '#2ecc71' : '#e74c3c'; ]]]"

              # 定时任务
              - type: custom:button-card
                template: tile_status
                entity: binary_sensor.airflow_airflow_ding_shi_ren_wu_zhuang_tai
                name: 定时任务
                icon: mdi:clock-outline
                styles:
                  card:
                    - grid-column: span 1
                    - grid-row: span 1
                  icon:
                    - color: "[[[ if (!entity || !entity.state) return '#95a5a6'; return entity.state === 'on' ? '#2ecc71' : '#95a5a6'; ]]]"

              # WiFi 信号
              - type: custom:button-card
                template: tile_small
                entity: sensor.airflow_airflow_wifixin_hao_qiang_du
                name: WiFi 信号
                icon: mdi:wifi
                styles:
                  card:
                    - grid-column: span 1
                    - grid-row: span 1
                  icon:
                    - color: "[[[ if (!entity || !entity.state) return '#95a5a6'; var r = parseInt(entity.state); if (isNaN(r)) return '#95a5a6'; return r < -70 ? '#e74c3c' : r < -50 ? '#f39c12' : '#2ecc71'; ]]]"
                state_display: |
                  [[[
                    return (entity && entity.state)
                      ? (parseInt(entity.state) < -70 ? '弱' : parseInt(entity.state) < -50 ? '中' : '强')
                      : '--';
                  ]]]

              # ── 定时设置 (2×2) ──
              - type: custom:button-card
                template: tile_control
                name: ⏰ 定时设置
                styles:
                  card:
                    - grid-column: span 2
                    - grid-row: span 2
                custom_fields:
                  entities:
                    card:
                      type: entities
                      state_color: true
                      card_mod:
                        style: |
                          :host {
                            --ha-card-background: transparent !important;
                            background: transparent !important;
                            border: none !important;
                            box-shadow: none !important;
                          }
                          ha-card {
                            background: transparent !important;
                            border: none !important;
                            box-shadow: none !important;
                            font-size: 16px !important;
                          }
                          .card-header { display: none; }
                      entities:
                        - entity: switch.airflow_airflow_qi_yong_guan_ji_ding_shi
                          name: 启用关机定时
                        - entity: switch.airflow_airflow_qi_yong_kai_ji_ding_shi
                          name: 启用开机定时
                        - entity: number.airflow_airflow_ding_shi_guan_ji_shi
                          name: 关机(时)
                        - entity: number.airflow_airflow_ding_shi_guan_ji_fen
                          name: 关机(分)
                        - entity: select.airflow_airflow_guan_ji_ri_mo_shi
                          name: 关机日模式
                        - entity: number.airflow_airflow_ding_shi_kai_ji_shi
                          name: 开机(时)
                        - entity: number.airflow_airflow_ding_shi_kai_ji_fen
                          name: 开机(分)
                        - entity: select.airflow_airflow_kai_ji_ri_mo_shi
                          name: 开机日模式
                        - entity: button.airflow_airflow_shan_chu_guan_ji_ding_shi
                          name: 删除关机定时
                        - entity: button.airflow_airflow_shan_chu_kai_ji_ding_shi
                          name: 删除开机定时

              # ── 电源控制 (2×2) ──
              - type: custom:button-card
                template: tile_control
                name: ⚡ 电源
                styles:
                  card:
                    - grid-column: span 2
                    - grid-row: span 2
                custom_fields:
                  entities:
                    card:
                      type: entities
                      state_color: true
                      card_mod:
                        style: |
                          :host {
                            --ha-card-background: transparent !important;
                            background: transparent !important;
                            border: none !important;
                            box-shadow: none !important;
                          }
                          ha-card {
                            background: transparent !important;
                            border: none !important;
                            box-shadow: none !important;
                            font-size: 16px !important;
                          }
                          .card-header { display: none; }
                      entities:
                        - entity: button.airflow_airflow_kai_ji
                          name: 开机
                        - entity: button.airflow_airflow_guan_ji
                          name: 关机
                        - entity: fan.airflow_airflow_feng_shan
                          name: 风扇
                        - entity: switch.airflow_airflow_zi_dong_feng_shan
                          name: 自动风扇

              # ── 屏幕控制 (2×2) ──
              - type: custom:button-card
                template: tile_control
                name: 🖵 屏幕
                styles:
                  card:
                    - grid-column: span 2
                    - grid-row: span 2
                custom_fields:
                  entities:
                    card:
                      type: entities
                      state_color: true
                      card_mod:
                        style: |
                          :host {
                            --ha-card-background: transparent !important;
                            background: transparent !important;
                            border: none !important;
                            box-shadow: none !important;
                          }
                          ha-card {
                            background: transparent !important;
                            border: none !important;
                            box-shadow: none !important;
                            font-size: 16px !important;
                          }
                          .card-header { display: none; }
                      entities:
                        - entity: button.airflow_airflow_kai_ping_mu
                          name: 开屏幕
                        - entity: button.airflow_airflow_guan_ping_mu
                          name: 关屏幕
                        - entity: button.airflow_airflow_zhong_qi_she_bei
                          name: 重启
                        - entity: number.airflow_airflow_ping_mu_liang_du
                          name: 屏幕亮度

              # ── 声音控制 (2×2) ──
              - type: custom:button-card
                template: tile_control
                name: 🔊 声音
                styles:
                  card:
                    - grid-column: span 2
                    - grid-row: span 2
                custom_fields:
                  entities:
                    card:
                      type: entities
                      state_color: true
                      card_mod:
                        style: |
                          :host {
                            --ha-card-background: transparent !important;
                            background: transparent !important;
                            border: none !important;
                            box-shadow: none !important;
                          }
                          ha-card {
                            background: transparent !important;
                            border: none !important;
                            box-shadow: none !important;
                            font-size: 16px !important;
                          }
                          .card-header { display: none; }
                      entities:
                        - entity: switch.airflow_airflow_an_jian_yin
                          name: 按键音
                        - entity: switch.airflow_airflow_kai_guan_ji_yin_xiao
                          name: 开关机音效
                        - entity: number.airflow_airflow_an_jian_yin_liang
                          name: 按键音量
                        - entity: number.airflow_airflow_kai_guan_ji_yin_liang
                          name: 开关机音量

              # ── LED 控制 (2×2) ──
              - type: custom:button-card
                template: tile_control
                name: 💡 LED
                styles:
                  card:
                    - grid-column: span 2
                    - grid-row: span 2
                custom_fields:
                  entities:
                    card:
                      type: entities
                      state_color: true
                      card_mod:
                        style: |
                          :host {
                            --ha-card-background: transparent !important;
                            background: transparent !important;
                            border: none !important;
                            box-shadow: none !important;
                          }
                          ha-card {
                            background: transparent !important;
                            border: none !important;
                            box-shadow: none !important;
                            font-size: 16px !important;
                          }
                          .card-header { display: none; }
                      entities:
                        - entity: switch.airflow_airflow_ledkai_guan
                          name: LED 开关
                        - entity: number.airflow_airflow_ledliang_du
                          name: LED 亮度
                        - entity: number.airflow_airflow_ledhong_se
                          name: LED 红
                        - entity: number.airflow_airflow_ledlu_se
                          name: LED 绿
                        - entity: number.airflow_airflow_ledlan_se
