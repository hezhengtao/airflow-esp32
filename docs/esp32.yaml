                          {"t":"on","en":1,"h":7,"m":0,"d":4,"mk":0}
                        ]
                        t=类型(off/on) en=启用(0/1) h=时 m=分
                        d=日模式:0今天 1明天 2后天 3每天 4工作日 5周末 6-12周一至日 13自定义
